<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flying Modi: Mission 25</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #222; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        #gameContainer {
            position: relative;
            width: 360px;
            height: 540px;
            max-width: 95vw;
            max-height: 70vh;
        }
        canvas { 
            background: linear-gradient(#4facfe 0%, #00f2fe 100%);
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
        }
        .ui-panel {
            text-align: center;
            margin-bottom: 10px;
        }
        /* Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            text-align: center;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            color: #FF9933;
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: #138808;
            border: 2px solid white;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background: #107006;
        }
        button:active {
            transform: scale(0.95);
        }
        #startBtn {
            opacity: 0;
            transition: opacity 1s ease;
        }
        .instructions {
            color: #ccc;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin: 5px; color: #FF9933;">Flying Modi</h2>
        <div id="scoreDisplay" style="font-size: 20px; font-weight: bold;">Score: 0 / 25</div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="360" height="540"></canvas>
        
        <div id="initScreen" class="overlay active">
            <h2>Welcome</h2>
            <p>Turn up your volume!</p>
            <button onclick="startIntro()">Enter Game</button>
        </div>

        <div id="introScreen" class="overlay">
            <div class="title">Flying Modi</div>
            <button id="startBtn" onclick="startGame()">Start Mission</button>
        </div>

        <div id="gameOverScreen" class="overlay">
            <h2 style="color: red; font-size: 30px;">Mission Failed!</h2>
            <p id="finalScore" style="font-size: 20px;"></p>
            <button onclick="resetGame()">Play Again</button>
        </div>

        <div id="winScreen" class="overlay">
            <h2 style="color: #ff69b4; font-size: 30px; text-shadow: 1px 1px #fff;">Congratulations!</h2>
            <p>Mission 25 Accomplished!</p>
            <button onclick="resetGame()" style="background: #ff69b4;">Restart Romance</button>
        </div>
    </div>

    <div class="instructions">
        Laptop: <b>Space</b> | Mobile: <b>Tap Screen</b>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreDisplay");

        // UI Elements
        const initScreen = document.getElementById("initScreen");
        const introScreen = document.getElementById("introScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const winScreen = document.getElementById("winScreen");
        const startBtn = document.getElementById("startBtn");
        const finalScoreText = document.getElementById("finalScore");

        // Audio Setup
        // --- Is section ko apne purane code se replace karein ---


        const audioWow = new Audio('./intro.mp3');
        const audioBhojyam = new Audio('./fail.mp3');
        const audioRomance = new Audio('./win.mp3');
        const audioPehlaNasha = new Audio('./gameplay.mp3');

        audioPehlaNasha.loop = true;


        [audioWow, audioBhojyam, audioRomance, audioPehlaNasha].forEach(audio => {
           audio.addEventListener('error', (e) => {
             console.error("Audio load nahi ho payi:", e.target.src);
            });
        });

        // Game State Variables
        let gameState = 'INIT'; // INIT, INTRO, PLAYING, WIN_ANIM, GAMEOVER
        let birdX = 60;
        let birdY = 200;
        let velocity = 0;
        let gravity = 0.4;
        let jump = -7;
        let score = 0;
        let pipes = [];
        let hearts = [];
        const winScore = 25;

        // Spirit Target for Win
        let spiritX = 300;
        let spiritY = 270;

        function startIntro() {
            initScreen.classList.remove("active");
            introScreen.classList.add("active");
            gameState = 'INTRO';
            
            // Play Wow audio
            audioWow.currentTime = 0;
            audioWow.play();

            // Wait 6 seconds, then show Start button
            setTimeout(() => {
                startBtn.style.opacity = "1";
                startBtn.style.pointerEvents = "all";
            }, 6000);
        }

        function startGame() {
            introScreen.classList.remove("active");
            audioWow.pause();
            
            resetVariables();
            gameState = 'PLAYING';
            
            audioPehlaNasha.currentTime = 0;
            audioPehlaNasha.play();
        }

        function resetVariables() {
            birdX = 60;
            birdY = 200;
            velocity = 0;
            score = 0;
            pipes = [];
            hearts = [];
            scoreElement.innerText = `Score: 0 / ${winScore}`;
            gameOverScreen.classList.remove("active");
            winScreen.classList.remove("active");
        }

        function resetGame() {
            audioBhojyam.pause();
            audioRomance.pause();
            startGame();
        }

        function drawModi() {
            ctx.beginPath();
            ctx.arc(birdX, birdY, 20, 0, Math.PI * 2);
            ctx.fillStyle = "#FF9933"; // Saffron
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.closePath();
            
            ctx.fillStyle = "white";
            ctx.font = "bold 10px Arial";
            ctx.fillText("MODI", birdX - 13, birdY + 4);
        }

        function drawSpirit() {
            ctx.beginPath();
            ctx.arc(spiritX, spiritY, 20, 0, Math.PI * 2);
            ctx.fillStyle = "#ffb6c1"; // Light Pink
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.closePath();
            
            ctx.fillStyle = "white";
            ctx.font = "bold 10px Arial";
            ctx.fillText("SPIRIT", spiritX - 16, spiritY + 4);
        }

        function drawHearts() {
            ctx.fillStyle = "#ff69b4";
            ctx.font = "15px Arial";
            hearts.forEach((h, index) => {
                ctx.globalAlpha = h.alpha;
                ctx.fillText("❤", h.x, h.y);
                h.y -= h.speed;
                h.alpha -= 0.02;
                if (h.alpha <= 0) hearts.splice(index, 1);
            });
            ctx.globalAlpha = 1.0;
        }

        function createPipe() {
            let gap = 160;
            let minHeight = 50;
            let maxHeight = canvas.height - gap - minHeight;
            let height = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;
            pipes.push({ x: canvas.width, y: height, passed: false });
        }

        function triggerGameOver() {
            gameState = 'GAMEOVER';
            audioPehlaNasha.pause();
            audioBhojyam.currentTime = 0;
            audioBhojyam.play();
            finalScoreText.innerText = `Score: ${score}`;
            gameOverScreen.classList.add("active");
        }

        function triggerWin() {
            gameState = 'WIN_ANIM';
            audioPehlaNasha.pause();
            audioRomance.currentTime = 0;
            audioRomance.play();
            
            // Spawn hearts continually
            setInterval(() => {
                if (gameState === 'WIN_ANIM') {
                    hearts.push({
                        x: birdX + Math.random() * 40 - 20,
                        y: birdY - 20,
                        speed: Math.random() * 2 + 1,
                        alpha: 1
                    });
                }
            }, 200);

            // Show win screen after small delay
            setTimeout(() => {
                winScreen.classList.add("active");
            }, 2000);
        }

        function update() {
            // Clear Background
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                // Physics
                velocity += gravity;
                birdY += velocity;

                // Draw and Update Pipes
                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].x -= 3;

                    // Pipe Colors
                    ctx.fillStyle = "#138808"; 
                    ctx.fillRect(pipes[i].x, 0, 50, pipes[i].y); // Top
                    ctx.fillRect(pipes[i].x, pipes[i].y + 160, 50, canvas.height); // Bottom

                    // Collision
                    if (birdX + 15 > pipes[i].x && birdX - 15 < pipes[i].x + 50) {
                        if (birdY - 15 < pipes[i].y || birdY + 15 > pipes[i].y + 160) {
                            triggerGameOver();
                        }
                    }

                    // Scoring
                    if (!pipes[i].passed && pipes[i].x + 50 < birdX) {
                        score++;
                        pipes[i].passed = true;
                        scoreElement.innerText = `Score: ${score} / ${winScore}`;
                        
                        if (score >= winScore) {
                            triggerWin();
                        }
                    }

                    if (pipes[i].x < -50) pipes.splice(i, 1);
                }

                if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                    createPipe();
                }

                // Floor/Ceiling Hit
                if (birdY > canvas.height || birdY < 0) triggerGameOver();
                
                drawModi();

            } else if (gameState === 'WIN_ANIM') {
                // Fly towards spirit smoothly
                birdX += (spiritX - 40 - birdX) * 0.05;
                birdY += (spiritY - birdY) * 0.05;
                
                // Keep drawing pipes but stop moving them
                for (let i = 0; i < pipes.length; i++) {
                    ctx.fillStyle = "#138808"; 
                    ctx.fillRect(pipes[i].x, 0, 50, pipes[i].y); 
                    ctx.fillRect(pipes[i].x, pipes[i].y + 160, 50, canvas.height);
                }

                drawSpirit();
                drawModi();
                drawHearts();

            } else if (gameState === 'GAMEOVER') {
                // Keep drawing static state behind overlay
                for (let i = 0; i < pipes.length; i++) {
                    ctx.fillStyle = "#138808"; 
                    ctx.fillRect(pipes[i].x, 0, 50, pipes[i].y); 
                    ctx.fillRect(pipes[i].x, pipes[i].y + 160, 50, canvas.height);
                }
                drawModi();
            } else if (gameState === 'INIT' || gameState === 'INTRO') {
                // Draw a simple standby scene
                drawModi();
            }

            requestAnimationFrame(update);
        }

        // Controls
        function handleAction(e) {
            if (e.type === "keydown" && e.code !== "Space") return;
            if (gameState === 'PLAYING') {
                e.preventDefault();
                velocity = jump;
            }
        }

        window.addEventListener("keydown", handleAction);
        canvas.addEventListener("touchstart", handleAction);
        canvas.addEventListener("mousedown", handleAction);

        // Start the loop
        update();
    </script>
</body>
</html>
