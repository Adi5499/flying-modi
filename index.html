<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flying Modi: Mission 25</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #111; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white;
        }
        #gameContainer {
            position: relative; width: 360px; height: 540px; max-width: 95vw; max-height: 80vh;
        }
        canvas { 
            background: linear-gradient(#4facfe 0%, #00f2fe 100%);
            border: 5px solid #fff; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            width: 100%; height: 100%; display: block;
        }
        .ui-panel { text-align: center; margin-bottom: 15px; z-index: 10; }
        
        /* Premium Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.5s ease; text-align: center;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        
        .title {
            font-size: 38px; font-weight: 900; color: #FF9933; text-shadow: 3px 3px 0 #fff;
            margin-bottom: 20px; animation: float 2s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        button {
            padding: 15px 35px; font-size: 20px; font-weight: bold; color: white;
            background: linear-gradient(#138808, #0d6105); border: 2px solid white; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.3s;
        }
        button:hover { transform: scale(1.1) rotate(-2deg); background: #107006; }
        
        #startBtn { opacity: 0; visibility: hidden; transition: 1s ease-in-out; }
        .instructions { color: #aaa; font-size: 14px; margin-top: 15px; font-style: italic; }
        
        #scoreDisplay { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid #FF9933; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 style="margin: 0; color: #FF9933; font-size: 28px;">FLYING MODI</h1>
        <div id="scoreDisplay">Score: 0 / 25</div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="360" height="540"></canvas>
        
        <div id="initScreen" class="overlay active">
            <h2 style="color: #FF9933;">Mission 25</h2>
            <p>Speaker On Karo!</p>
            <button onclick="startIntro()">READY JII!</button>
        </div>

        <div id="introScreen" class="overlay">
            <div class="title">WAAH!<br>Kya Ladka Hai...</div>
            <button id="startBtn" onclick="startGame()">START GAME</button>
        </div>

        <div id="gameOverScreen" class="overlay">
            <h2 style="color: #ff4444; font-size: 35px;">KHATAM!</h2>
            <p id="finalScore" style="font-size: 22px;"></p>
            <button onclick="resetGame()">Try Again</button>
        </div>

        <div id="winScreen" class="overlay">
            <h2 style="color: #ff69b4; font-size: 35px; text-shadow: 0 0 10px #fff;">FINALLY! ❤️</h2>
            <p>Mission Successful!</p>
            <button onclick="resetGame()" style="background: #ff69b4;">Fir Se?</button>
        </div>
    </div>

    <div class="instructions">Space Bar ya Tap karke jump karein!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreDisplay");

        // Elements
        const screens = {
            init: document.getElementById("initScreen"),
            intro: document.getElementById("introScreen"),
            over: document.getElementById("gameOverScreen"),
            win: document.getElementById("winScreen")
        };
        const startBtn = document.getElementById("startBtn");

        // Audios
        const audio = {
            intro: new Audio('./intro.mp3'),
            fail: new Audio('./fail.mp3'),
            win: new Audio('./win.mp3'),
            game: new Audio('./gameplay.mp3')
        };
        audio.game.loop = true;

        // Images
        const img = {
            modi: new Image(),
            spirit: new Image()
        };
        img.modi.src = './modi.png';
        img.spirit.src = './spirit.png';

        // Physics & Config
        let state = 'INIT';
        let bird = { x: 60, y: 200, vel: 0, w: 50, h: 50 };
        let config = { gravity: 0.25, jump: -5.8, pipeSpd: 2.5, pipeGap: 195 };
        let score = 0, pipes = [], hearts = [];
        let winPos = { x: 300, y: 270 };

        function startIntro() {
            screens.init.classList.remove("active");
            screens.intro.classList.add("active");
            state = 'INTRO';
            audio.intro.play().catch(e => console.log("Audio Error"));

            // 6 Sec delay for start button
            setTimeout(() => {
                startBtn.style.opacity = "1";
                startBtn.style.visibility = "visible";
            }, 6000);
        }

        function startGame() {
            screens.intro.classList.remove("active");
            audio.intro.pause();
            resetData();
            state = 'PLAYING';
            audio.game.currentTime = 0;
            audio.game.play();
        }

        function resetData() {
            bird.y = 200; bird.vel = 0; score = 0;
            pipes = []; hearts = [];
            scoreElement.innerText = `Score: 0 / 25`;
            screens.over.classList.remove("active");
            screens.win.classList.remove("active");
        }

        function resetGame() {
            audio.fail.pause();
            audio.win.pause();
            startGame();
        }

        function createPipe() {
            let h = Math.floor(Math.random() * (canvas.height - config.pipeGap - 120)) + 60;
            pipes.push({ x: canvas.width, y: h, done: false });
        }

        function triggerWin() {
            state = 'WIN_ANIM';
            audio.game.pause();
            audio.win.currentTime = 0;
            audio.win.play();
            // Heart particle interval
            let heartInt = setInterval(() => {
                if(state !== 'WIN_ANIM') clearInterval(heartInt);
                hearts.push({ x: bird.x + Math.random()*40-20, y: bird.y, s: Math.random()*2+1, a: 1 });
            }, 250);
            setTimeout(() => screens.win.classList.add("active"), 3500);
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state === 'PLAYING') {
                bird.vel += config.gravity;
                bird.y += bird.vel;

                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].x -= config.pipeSpd;

                    // Pipes
                    ctx.fillStyle = "#138808";
                    ctx.fillRect(pipes[i].x, 0, 50, pipes[i].y);
                    ctx.fillRect(pipes[i].x, pipes[i].y + config.pipeGap, 50, canvas.height);

                    // Hitbox check
                    if (bird.x + 15 > pipes[i].x && bird.x - 15 < pipes[i].x + 50) {
                        if (bird.y - 15 < pipes[i].y || bird.y + 15 > pipes[i].y + config.pipeGap) {
                            state = 'GAMEOVER';
                            audio.game.pause();
                            audio.fail.play();
                            document.getElementById("finalScore").innerText = `Final Score: ${score}`;
                            screens.over.classList.add("active");
                        }
                    }

                    if (!pipes[i].done && pipes[i].x + 50 < bird.x) {
                        score++; pipes[i].done = true;
                        scoreElement.innerText = `Score: ${score} / 25`;
                        if (score >= 25) triggerWin();
                    }
                    if (pipes[i].x < -60) pipes.splice(i, 1);
                }

                if (pipes.length === 0 || pipes[pipes.length-1].x < canvas.width - 220) createPipe();
                if (bird.y > canvas.height || bird.y < 0) { 
                    state = 'GAMEOVER'; audio.game.pause(); audio.fail.play(); screens.over.classList.add("active"); 
                }
                ctx.drawImage(img.modi, bird.x - 25, bird.y - 25, bird.w, bird.h);

            } else if (state === 'WIN_ANIM') {
                bird.x += (winPos.x - 70 - bird.x) * 0.02;
                bird.y += (winPos.y - bird.y) * 0.02;
                ctx.drawImage(img.spirit, winPos.x - 30, winPos.y - 30, 70, 70);
                ctx.drawImage(img.modi, bird.x - 25, bird.y - 25, bird.w, bird.h);
                
                // Hearts
                ctx.font = "20px Arial";
                hearts.forEach((h, i) => {
                    ctx.globalAlpha = h.a;
                    ctx.fillText("❤️", h.x, h.y);
                    h.y -= h.s; h.a -= 0.01;
                    if(h.a <= 0) hearts.splice(i, 1);
                });
                ctx.globalAlpha = 1.0;
            } else {
                ctx.drawImage(img.modi, bird.x - 25, bird.y - 25, bird.w, bird.h);
            }
            requestAnimationFrame(update);
        }

        function jumpAction(e) {
            if (e.type === "keydown" && e.code !== "Space") return;
            if (state === 'PLAYING') { e.preventDefault(); bird.vel = config.jump; }
        }

        window.addEventListener("keydown", jumpAction);
        canvas.addEventListener("touchstart", jumpAction, {passive: false});
        canvas.addEventListener("mousedown", jumpAction);

        update();
    </script>
</body>
</html>
